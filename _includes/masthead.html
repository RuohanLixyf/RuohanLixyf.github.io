{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <a class="masthead__brand" href="{{ base_path }}/">
      <span class="masthead__brand-text">Ruohan Li</span>
      <span class="masthead__brand-dot" aria-hidden="true"></span>
    </a>
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button class="hidden" type="button" aria-label="Toggle navigation menu"><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg"><a href="{{ base_path }}/">Home</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
              {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
