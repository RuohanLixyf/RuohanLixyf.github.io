{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<!-- http://t.co/dKP3o1e -->
<meta name="HandheldFriendly" content="True">
<meta name="MobileOptimized" content="320">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">
<link rel="stylesheet" href="{{ base_path }}/assets/css/custom.css">

<meta http-equiv="cleartype" content="on">

<script>
document.addEventListener("DOMContentLoaded", function() {
  var links = document.querySelectorAll('#site-nav .visible-links a[href], #site-nav .hidden-links a[href]');
  var currentPath = window.location.pathname.replace(/\/$/, "") || "/";

  links.forEach(function(link) {
    var linkPath = new URL(link.href, window.location.origin).pathname.replace(/\/$/, "") || "/";

    if (linkPath === currentPath) {
      link.classList.add("active");
    }
  });
});
</script>
